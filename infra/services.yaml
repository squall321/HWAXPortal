# HWAX service manifest — the one place that says how each federated service starts.
#
# The portal orchestrator (infra/scripts/services.py) reads this to bring the whole stack
# up / check / down. Routing (nginx) lives in backend/config/routes.env; THIS file is about
# *starting the processes behind those routes* + the chat stack (vLLM / MCP / agent).
#
# NO SECRETS HERE. Remote hosts use SSH KEY auth (ssh_user only). If a remote start needs
# root, put a NOPASSWD line in that host's sudoers — never a password in this file.
#
# Per service:
#   name      identifier (also the audit/log name)
#   host      'local' (this box) or an IP/hostname (SSH, key auth)
#   ssh_user  remote only — the SSH user (key-based; no password)
#   dir       absolute/~ path to the project. Omit to AUTO-DISCOVER by `discover`.
#   discover  repo dir name searched in: <parent-of-portal>/, ~/Projects/, ~/claude/
#   env       extra environment for the start command
#   start     command run from `dir` (orchestrator detaches it; foreground servers are fine)
#   health    URL polled until the service answers (any HTTP response = up)
#   tier      startup order group (lower first): infra(0) → services(10) → chat(20)

services:
  # ── tier 0: the portal itself (nginx + backend + SPA) ──
  - name: portal
    host: local
    dir: .                      # the portal repo is the orchestrator's own root
    env: { HWAX_NO_BUILD: "1" }
    start: ./infra/scripts/start.sh
    # down/restart must stop the apptainer INSTANCES (backend :8723 + nginx), not fuser-kill the
    # health port :8088 (that kills nginx only → the portal backend keeps running OLD code, so a
    # pulled update never applies). This makes `down portal && up --update portal` truly redeploy.
    stop: 'A="$(command -v apptainer || ls -d infra/apptainer/bin-*/usr/bin/apptainer 2>/dev/null | head -1)"; for i in hwax_portal hwax_nginx; do "$A" instance stop "$i" 2>/dev/null || true; done'
    health: http://localhost:8088/health
    tier: 0

  # ── tier 10: federated sub-services (proxied via routes.env) ──
  - name: mx-white-paper
    host: local
    discover: MXWhitePaper
    start: ./infra/scripts/start.sh
    health: http://localhost:5173/
    tier: 10

  - name: heax-hub
    host: local
    discover: HEAXHub
    env: { HEAX_NO_BUILD: "1" }
    # update rebuilds the SPA with base=/heax-hub/ so its assets resolve under the portal
    # sub-path (default build is base=/ → /assets/ 404s behind the proxy). ~0.8s, offline.
    # heax repo untouched — its Makefile already takes HEAX_BASE_PATH; the portal supplies it.
    update: "git pull --ff-only; HEAX_BASE_PATH=/heax-hub/ make build"
    # heal.sh (not start.sh): idempotent converge-to-healthy. start.sh dies on `set -e` +
    # "instance already exists" stale state, which left heax down after an update/restart.
    # heal.sh clears stale infra → runs start.sh bootstrap → safety-net start → verify.
    start: bash deploy/apptainer/heal.sh
    health: http://localhost:4180/
    tier: 10

  - name: ai-data-hub
    host: local
    discover: AIDataHub
    # No AIDH_ROOT_PATH: portal nginx STRIPs /ai-data-hub/, so root_path would double-prefix
    # the dashboard redirect. Standard mode + strip is the working combo (see its deploy .env).
    start: ./boot.sh --force
    health: http://localhost:8001/
    tier: 10

  - name: signalforge
    host: local
    discover: SignalForge
    start: ./scripts/up.sh
    health: http://localhost:17370/
    tier: 10

  - name: report-archive
    host: local
    discover: ReportArchive
    update: false               # do NOT auto git-pull/touch the ReportArchive repo
    start: ./start.sh
    health: http://localhost:3000/api/health
    tier: 10

  # ── tier 20: MCP chat stack (heavy GPU last; vLLM may live on a remote host) ──
  - name: vllm
    host: local                 # set to a B300 host IP + ssh_user for prod (URL-only swap)
    dir: ./docs                 # start-dev-vllm.sh lives in the portal docs (dev)
    update: false               # stateless: code/model ship via SIF image, not git pull
    # stop is a no-op so `down`/`restart` DON'T kill vLLM: it's a heavy GPU load (~1-2 min)
    # and a plain port-kill leaves a VLLM::EngineCore zombie holding VRAM → next start OOMs.
    # `up` finds it already-up and skips. To really restart it: infra/scripts/restart-vllm.sh.
    stop: "true"
    start: ./start-dev-vllm.sh
    health: http://localhost:8000/health
    tier: 20

  # ── tier 15: real per-service MCP servers (the chat's tools; Agent Server consumes these) ──
  - name: reportarchive-mcp
    host: local
    discover: ReportArchive
    update: false                         # shares the ReportArchive repo — don't auto-pull it
    start: ./mcp_server/run_dev.sh        # FastMCP :3002, forwards Authorization to the backend
    health: http://localhost:3002/mcp     # 406 to GET, but answering = up
    tier: 15

  - name: signalforge-mcp
    host: local
    discover: SignalForge
    env: { MCP_PORT: "8013" }
    start: ./mcp-server/start_mcp.sh      # FastMCP :8013, VOC tools (SF_MCP_TOKEN Bearer auth)
    health: http://localhost:8013/mcp
    tier: 15

  - name: mxwp-mcp
    host: local
    discover: MXWhitePaper
    update: false                         # MX repo managed separately (own stack/systemd)
    start: 'apptainer exec instance://mxwp_api bash -lc "cd /workspace/dist/llm-docx-toolkit && MXWP_API_URL=http://127.0.0.1:8800 python3 -m mcp --http --host 127.0.0.1 --port 8765"'
    health: http://localhost:8765/mcp     # 406 to GET, but answering = up; forwards Bearer mxwp_ to API
    tier: 15

  # ── tier 16: central MCP gateway — aggregates the 3 tier-15 MCPs into one endpoint ──
  - name: mcp-gateway
    host: local
    discover: HWAXMcpGateway
    start: ./start.sh                     # streamable-http :9110, injects per-backend tokens
    health: http://localhost:9110/health  # unauthenticated JSON {status,tools,backends}
    tier: 16

  - name: agent-server
    host: local
    discover: HWAXAgentServer
    env: { VLLM_BASE_URL: "http://127.0.0.1:8000/v1", VLLM_MODEL: qwen2.5-7b-dev,
           MCP_CONFIG: "/home/koopark/claude/HWAXAgentServer/mcp_servers.json" }
    start: ./start.sh
    health: http://localhost:9009/health
    tier: 20
