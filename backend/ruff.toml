target-version = "py312"
line-length = 100
src = ["app"]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["B008"]  # FastAPI Depends() in defaults is idiomatic

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
# Mock IdP builds SAML XML via templated f-strings; long XML lines are intrinsic.
"app/auth/routes/mock_idp.py" = ["E501"]
